appId: com.ivynotfound.kanbagent
productName: KanbAgent
copyright: Copyright © 2024-2026 IvyNotFound

publish:
  provider: github
  owner: IvyNotFound
  repo: KanbAgent
  private: false

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: KanbAgent
  shortcutName: KanbAgent
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  multiLanguageInstaller: true
  include: build/installer.nsh

mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}.${ext}

linux:
  icon: build/icon.png
  maintainer: "IvyNotFound <noreply@ivynotfound.dev>"
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: ${productName}-${version}.${ext}

extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - '**/*'
  - from: scripts/
    to: scripts/
    filter:
      - dbq.js
      - dbw.js
      - dbstart.js
      - dblock.js
      - capture-tokens-hook.js

files:
  - "**/*"
  - "!node_modules/@rollup/rollup-win32-x64-msvc/**"
  - "!.claude/**"

directories:
  output: dist
  buildResources: build
