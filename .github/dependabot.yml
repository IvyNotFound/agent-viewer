version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      electron:
        patterns: ["electron*"]
      vue:
        patterns: ["vue*", "@vue/*", "vite*", "@vitejs/*", "electron-vite"]
      testing:
        patterns: ["vitest*", "@vitest/*", "playwright*", "@playwright/*", "stryker*", "@stryker-mutator/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
