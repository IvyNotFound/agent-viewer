name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.21.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# Skip Electron binary download during npm ci on all jobs.
# Electron binary is re-downloaded separately only where E2E tests need it.
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  i18n-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check i18n completeness
        run: node scripts/check-i18n.js

      - name: Security audit (critical CVEs)
        run: npm audit --audit-level=critical --production

  lint:
    needs: [i18n-check]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Debug npm config
        run: |
          echo "=== npm root: $(npm root) ==="
          echo "=== npm root -g: $(npm root -g) ==="
          echo "=== npm prefix: $(npm config get prefix) ==="
          echo "=== cat ~/.npmrc ===" && cat ~/.npmrc 2>/dev/null || echo "not found"
          echo "=== cat .npmrc ===" && cat .npmrc 2>/dev/null || echo "not found"
          echo "=== npm config list ===" && npm config list

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          echo "=== After npm install: $(ls -la . 2>&1 | head -5) ==="
          echo "=== node_modules exists: $(ls -d node_modules 2>/dev/null && echo YES || echo NO) ==="

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    needs: [i18n-check]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          node node_modules/esbuild/install.js
          node node_modules/vitest/node_modules/esbuild/install.js 2>/dev/null || true
          node node_modules/vue-demi/scripts/postinstall.js || true
          npm rebuild better-sqlite3

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage summary to GitHub Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              console.log('## Coverage');
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + fmt(s.statements) + ' |');
              console.log('| Branches   | ' + fmt(s.branches)   + ' |');
              console.log('| Functions  | ' + fmt(s.functions)  + ' |');
              console.log('| Lines      | ' + fmt(s.lines)      + ' |');
            " >> \$GITHUB_STEP_SUMMARY
          fi

  e2e-linux:
    needs: [i18n-check]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          node node_modules/esbuild/install.js
          node node_modules/vue-demi/scripts/postinstall.js || true

      - name: Download Electron binary (needed for E2E)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
        run: node node_modules/electron/install.js

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Install Playwright + Electron deps
        run: |
          npm install -D @playwright/test playwright
          npx playwright install chromium --with-deps

      - name: Install Linux display dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xvfb libgtk-3-dev libnss3 libasound2 libgbm1

      - name: Build renderer (electron-vite)
        run: npx electron-vite build

      - name: Run E2E tests (with Xvfb virtual display)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test --config playwright.config.ts
        env:
          CI: true
          DISPLAY: ':99'

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-release-linux
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-windows:
    needs: [i18n-check]
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: npm ci

      - name: Download Electron binary (needed for E2E)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
        run: node node_modules/electron/install.js

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Install Playwright
        run: |
          npm install -D @playwright/test playwright
          npx playwright install chromium --with-deps

      - name: Build renderer (electron-vite)
        run: npx electron-vite build

      - name: Run E2E tests
        run: npx playwright test --config playwright.config.ts
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-release-windows
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-mac:
    needs: [i18n-check]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          node node_modules/esbuild/install.js
          node node_modules/vue-demi/scripts/postinstall.js || true

      - name: Download Electron binary (needed for E2E)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
        run: node node_modules/electron/install.js

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Install Playwright
        run: |
          npm install -D @playwright/test playwright
          npx playwright install chromium --with-deps

      - name: Build renderer (electron-vite)
        run: npx electron-vite build

      - name: Run E2E tests
        run: npx playwright test --config playwright.config.ts
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-release-mac
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  build-windows:
    needs: [lint, unit-tests, e2e-linux, e2e-windows, e2e-mac]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: npm ci

      - name: Download sqlite3 binary
        run: node scripts/download-sqlite3.js

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build (Vite + electron-builder Windows)
        run: npx electron-vite build && npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: installer-windows
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    needs: [lint, unit-tests, e2e-linux, e2e-windows, e2e-mac]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          node node_modules/esbuild/install.js
          node node_modules/vue-demi/scripts/postinstall.js || true

      - name: Download sqlite3 binary
        run: node scripts/download-sqlite3.js

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build (Vite + electron-builder macOS)
        run: npx electron-vite build && npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: installer-mac
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  build-linux:
    needs: [lint, unit-tests, e2e-linux, e2e-windows, e2e-mac]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          node node_modules/esbuild/install.js
          node node_modules/vue-demi/scripts/postinstall.js || true

      - name: Download sqlite3 binary
        run: node scripts/download-sqlite3.js

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build (Vite + electron-builder Linux)
        run: npx electron-vite build && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: installer-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract changelog for this version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: false
          body_path: /tmp/release_notes.md
          files: |
            artifacts/installer-windows/*.exe
            artifacts/installer-windows/latest.yml
            artifacts/installer-mac/*.dmg
            artifacts/installer-mac/latest-mac.yml
            artifacts/installer-linux/*.AppImage
            artifacts/installer-linux/*.deb
            artifacts/installer-linux/latest-linux.yml

  notify-failure:
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs: [i18n-check, lint, unit-tests, e2e-linux, e2e-windows, e2e-mac, build-windows, build-mac, build-linux, create-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Notify Slack on failure
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3.0.1
        with:
          payload: |
            {
              "text": ":x: Release *${{ github.ref_name }}* failed — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
