name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.21.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check i18n completeness
        run: node scripts/check-i18n.js

  unit-tests:
    needs: [i18n-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage summary to GitHub Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              console.log('## Coverage');
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + fmt(s.statements) + ' |');
              console.log('| Branches   | ' + fmt(s.branches)   + ' |');
              console.log('| Functions  | ' + fmt(s.functions)  + ' |');
              console.log('| Lines      | ' + fmt(s.lines)      + ' |');
            " >> \$GITHUB_STEP_SUMMARY
          fi

  e2e-linux:
    needs: [i18n-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Electron deps
        run: |
          npm install -D @playwright/test playwright
          npx playwright install chromium --with-deps

      - name: Install Linux display dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xvfb libgtk-3-dev libnss3 libasound2t64 libgbm1

      - name: Build renderer (electron-vite)
        run: npx electron-vite build

      - name: Run E2E tests (with Xvfb virtual display)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test --config playwright.config.ts
        env:
          CI: true
          DISPLAY: ':99'

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-release-linux
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-windows:
    needs: [i18n-check]
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install -D @playwright/test playwright
          npx playwright install chromium --with-deps

      - name: Build renderer (electron-vite)
        run: npx electron-vite build

      - name: Run E2E tests
        run: npx playwright test --config playwright.config.ts
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-release-windows
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-mac:
    needs: [i18n-check]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install -D @playwright/test playwright
          npx playwright install chromium --with-deps

      - name: Build renderer (electron-vite)
        run: npx electron-vite build

      - name: Run E2E tests
        run: npx playwright test --config playwright.config.ts
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-release-mac
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  build-windows:
    needs: [unit-tests, e2e-linux, e2e-windows, e2e-mac]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download sqlite3 binary
        run: node scripts/download-sqlite3.js

      - name: Build (Vite + electron-builder Windows)
        run: npx electron-vite build && npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    needs: [unit-tests, e2e-linux, e2e-windows, e2e-mac]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + electron-builder macOS)
        run: npx electron-vite build && npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installer-mac
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  build-linux:
    needs: [unit-tests, e2e-linux, e2e-windows, e2e-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + electron-builder Linux)
        run: npx electron-vite build && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for this version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: false
          body_path: /tmp/release_notes.md
          files: |
            artifacts/installer-windows/*.exe
            artifacts/installer-windows/latest.yml
            artifacts/installer-mac/*.dmg
            artifacts/installer-mac/latest-mac.yml
            artifacts/installer-linux/*.AppImage
            artifacts/installer-linux/*.deb
            artifacts/installer-linux/latest-linux.yml
